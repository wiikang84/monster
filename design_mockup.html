<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Tower — 레벨 배치 목업 (그레이박스)</title>
<style>
  body{margin:0;background:#1f2430;color:#e6e6e6;font-family:"맑은 고딕","Malgun Gothic",sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
  h1{font-size:20px;margin:4px 0}
  .sub{color:#9aa3b2;font-size:13px;margin-bottom:16px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:13px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:14px;height:14px;border-radius:3px;display:inline-block}
  .note{max-width:720px;color:#9aa3b2;font-size:12px;margin-top:14px;line-height:1.6;text-align:center}
</style>
</head>
<body>
  <h1>🏰 Tower — 레벨 배치 목업</h1>
  <div class="sub">프로토타입이 실제로 생성하는 좌표 그대로 (도형 단계 · 위에서 내려다본 모습)</div>

  <svg width="720" height="700" viewBox="0 0 720 700">
    <!-- 바닥 -->
    <rect x="10" y="10" width="700" height="660" rx="14" fill="#5b9a52"/>

    <!-- 경로 (적 이동 길) -->
    <polyline points="40,130 520,130 520,340 160,340 160,550 640,550"
              fill="none" stroke="#9e7e54" stroke-width="58" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="40,130 520,130 520,340 160,340 160,550 640,550"
              fill="none" stroke="#b08e60" stroke-width="48" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="2 26" opacity="0.5"/>

    <!-- 시작/기지 라벨 -->
    <circle cx="40" cy="130" r="13" fill="#ffffff" opacity="0.85"/>
    <text x="58" y="118" fill="#fff" font-size="14" font-weight="bold">▶ START (적 등장)</text>
    <rect x="616" y="526" width="48" height="48" rx="6" fill="#d83a3a" stroke="#7a1010" stroke-width="3"/>
    <text x="556" y="600" fill="#fff" font-size="14" font-weight="bold">🏠 기지(BASE)</text>

    <!-- 타워 설치 슬롯 (회색) -->
    <g fill="#8a8f99" stroke="#5d626b" stroke-width="2">
      <rect x="195" y="195" width="50" height="50" rx="6"/>
      <rect x="345" y="195" width="50" height="50" rx="6"/>
      <rect x="405" y="225" width="50" height="50" rx="6"/>
      <rect x="255" y="405" width="50" height="50" rx="6"/>
      <rect x="375" y="405" width="50" height="50" rx="6"/>
      <rect x="45"  y="405" width="50" height="50" rx="6"/>
      <rect x="465" y="615" width="50" height="50" rx="6"/>
    </g>

    <!-- 설치된 타워 예시 (파랑) + 사거리 -->
    <g>
      <circle cx="220" cy="220" r="150" fill="#3b82f6" opacity="0.12"/>
      <circle cx="370" cy="220" r="150" fill="#3b82f6" opacity="0.12"/>
      <circle cx="280" cy="430" r="150" fill="#3b82f6" opacity="0.12"/>
      <rect x="200" y="200" width="40" height="40" rx="5" fill="#2f6fd6" stroke="#1a3f7a" stroke-width="3"/>
      <rect x="350" y="200" width="40" height="40" rx="5" fill="#2f6fd6" stroke="#1a3f7a" stroke-width="3"/>
      <rect x="260" y="410" width="40" height="40" rx="5" fill="#2f6fd6" stroke="#1a3f7a" stroke-width="3"/>
      <circle cx="220" cy="200" r="6" fill="#16306b"/>
      <circle cx="370" cy="200" r="6" fill="#16306b"/>
      <circle cx="280" cy="410" r="6" fill="#16306b"/>
    </g>

    <!-- 적 예시 (빨강=기본, 노랑=빠름) -->
    <rect x="328" y="116" width="28" height="28" rx="4" fill="#d83a3a"/>
    <rect x="506" y="236" width="28" height="28" rx="4" fill="#d83a3a"/>
    <rect x="176" y="328" width="22" height="22" rx="4" fill="#eed02f"/>

    <!-- HUD 모사 -->
    <rect x="24" y="24" width="330" height="40" rx="8" fill="#111726" opacity="0.85"/>
    <text x="40" y="50" fill="#fff" font-size="16">골드 120     라이프 10     웨이브 1/3</text>
    <rect x="24" y="74" width="170" height="40" rx="8" fill="#2f6fd6"/>
    <text x="44" y="100" fill="#fff" font-size="16" font-weight="bold">웨이브 1 시작 ▶</text>
  </svg>

  <div class="legend">
    <span><i class="sw" style="background:#5b9a52"></i>바닥</span>
    <span><i class="sw" style="background:#b08e60"></i>경로(적 이동)</span>
    <span><i class="sw" style="background:#8a8f99"></i>타워 슬롯(클릭해 설치)</span>
    <span><i class="sw" style="background:#2f6fd6"></i>타워(+옅은 원=사거리)</span>
    <span><i class="sw" style="background:#d83a3a"></i>적(기본)</span>
    <span><i class="sw" style="background:#eed02f"></i>적(빠름)</span>
    <span><i class="sw" style="background:#d83a3a;border:2px solid #7a1010"></i>기지</span>
  </div>

  <div class="note">
    ⚠️ 지금은 <b>도형(그레이박스) 단계</b>입니다. 게임 동작(적 이동·타워 자동공격·골드/라이프·웨이브·승패)을 먼저 검증하는 단계라 외형은 단순합니다.<br>
    목업이 OK면 이 도형들을 <b>Kenney Tower Defense Kit(CC0)</b> 3D 모델로 그대로 교체합니다 — 성·타워·길·적 모델로 바뀌어 "진짜 게임" 모습이 됩니다.
  </div>
</body>
</html>
